/* ============================================================
   STATE & LOGIC
   ============================================================ */
let state = {
  screen: "hero",
  form: { name: "", phone: "", email: "", source: "" },
  answers: [],
  qIndex: 0,
  selectedType: null,
  resultType: null,
};

function calcResult(answers) {
  const scores = { overthinker: 0, ghost: 0, talker: 0, dominator: 0 };
  answers.forEach(a => { if (a in scores) scores[a]++; });
  const max = Math.max(...Object.values(scores));
  if (max <= 2) return "connector";
  return Object.keys(scores).find(k => scores[k] === max) || "connector";
}

/* ============================================================
   RENDER
   ============================================================ */
const app = document.getElementById("app");

function render() {
  app.innerHTML = "";
  if (state.screen === "hero") renderHero();
  else if (state.screen === "form") renderForm();
  else if (state.screen === "quiz") renderQuiz();
  else if (state.screen === "loading") renderLoading();
  else if (state.screen === "result") renderResult();
}

function updateForm(key, val) {
  state.form[key] = val;
  const btn = document.getElementById("btn-start");
  if (btn) btn.disabled = !isFormValid();
}

function isFormValid() {
  const f = state.form;
  return f.name.trim() && f.phone.trim() && f.email.trim() && f.source;
}

function startQuiz() {
  if (!isFormValid()) return;
  state.screen = "quiz";
  state.qIndex = 0;
  state.answers = [];
  state.selectedType = null;
  render();
}

/* QUIZ */
function renderQuiz() {
  const q = QUESTIONS[state.qIndex];
  const pct = Math.round((state.qIndex / QUESTIONS.length) * 100);
  app.innerHTML = `
  <div class="fade-in" style="padding-top:32px">
    <div class="quiz-header">
      <div class="quiz-meta">
        <span class="quiz-counter">TalkDNA™ · Pertanyaan ${state.qIndex + 1} / ${QUESTIONS.length}</span>
        <span class="quiz-pct">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-q">${q.q}</div>
    <div class="options">
      ${q.opts.map((o, i) => `
        <button class="opt${state.selectedType===o.type?' selected':''}" onclick="selectOpt('${o.type}',${i})">
          <span class="opt-key">${String.fromCharCode(65+i)}</span>
          <span>${o.text}</span>
        </button>`).join("")}
    </div>
    <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" ${state.selectedType?"":"disabled"}>
      ${state.qIndex < QUESTIONS.length-1 ? "Pertanyaan Berikutnya →" : "Lihat Hasil Gw →"}
    </button>
  </div>`;
}

function selectOpt(type) {
  state.selectedType = type;
  renderQuiz();
}

function nextQuestion() {
  if (!state.selectedType) return;
  state.answers.push(state.selectedType);
  state.selectedType = null;
  if (state.qIndex < QUESTIONS.length - 1) {
    state.qIndex++;
    render();
  } else {
    state.resultType = calcResult(state.answers);
    state.screen = "loading";
    render();
    submitData();
  }
}

/* LOADING */
function renderLoading() {
  app.innerHTML = `
  <div class="loading-screen fade-in">
    <div class="loading-spinner"></div>
    <p>Menganalisis pola komunikasi lo...</p>
  </div>`;
  setTimeout(() => {
    state.screen = "result";
    render();
  }, 2200);
}

/* SUBMIT TO SHEETS */
async function submitData() {
  const t = TYPES[state.resultType];
  await saveToSheet({
    timestamp: new Date().toISOString(),
    name: state.form.name,
    phone: state.form.phone,
    email: state.form.email,
    source: state.form.source,
    result_type: t.name,
    answers: state.answers.join(", "),
  });
}
