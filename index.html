<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>TalkDNA™ — Tes Karakter Komunikasi Lo | Stanley Academy</title>
<meta name="description" content="Temukan tipe komunikator lo dalam 5 menit. Assessment gratis dari Stanley Academy."/>
<meta name="theme-color" content="#0a0e27"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

:root{
  --ink:#0a0e27;
  --ink-2:#1a1f3a;
  --ink-3:#4a5170;
  --ink-4:#8a92b0;
  --paper:#f6f4ef;
  --paper-2:#ecebe4;
  --cream:#faf8f3;
  --line:rgba(10,14,39,0.10);
  --line-2:rgba(10,14,39,0.18);
  --accent:#3d5afe;
  --accent-2:#7c4dff;
  --accent-glow:rgba(61,90,254,0.35);
  --gold:#c9a14a;
  --green:#0d7a4e;
  --green-bg:#e6f7f0;
  --red:#c0392b;
  --red-bg:#fdecea;
  --r:20px;
  --r-sm:12px;
  --r-lg:28px;
  --serif:'Instrument Serif', 'Times New Roman', serif;
  --sans:'Inter', system-ui, sans-serif;
  --mono:'JetBrains Mono', monospace;
  --ease:cubic-bezier(.22,.61,.36,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}

body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  line-height:1.55;
  font-feature-settings:"ss01","cv11";
  position:relative;
}

/* AMBIENT BACKGROUND */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.ambient::before,.ambient::after{
  content:"";position:absolute;border-radius:50%;filter:blur(80px);opacity:.45;
  animation:float 22s ease-in-out infinite;
}
.ambient::before{
  width:520px;height:520px;
  background:radial-gradient(circle,#a8b6ff 0%,transparent 65%);
  top:-180px;left:-120px;
}
.ambient::after{
  width:600px;height:600px;
  background:radial-gradient(circle,#d4c5ff 0%,transparent 65%);
  bottom:-200px;right:-150px;
  animation-delay:-11s;
}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(40px,-30px) scale(1.08)}
}
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.35;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
}

.shell{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:0 22px 90px}
@media(min-width:520px){.shell{padding:0 32px 90px}}

/* HEADER */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 0;
}
.hdr-brand{
  display:inline-flex;align-items:center;gap:9px;
  font-size:13px;font-weight:700;color:var(--ink);
  text-decoration:none;letter-spacing:-0.01em;
}
.hdr-brand-mark{
  width:26px;height:26px;border-radius:8px;
  background:var(--ink);color:var(--cream);
  display:grid;place-items:center;font-family:var(--serif);font-size:18px;font-style:italic;
  line-height:1;padding-bottom:2px;
}
.hdr-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--ink-3);
  background:rgba(255,255,255,.6);backdrop-filter:blur(10px);
  border:1px solid var(--line);
  border-radius:100px;padding:6px 12px;
}
.hdr-badge::before{
  content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
  animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* HERO */
.hero{padding:72px 0 40px;animation:fadeUp .9s var(--ease-out) both}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:var(--ink-3);letter-spacing:0.08em;text-transform:uppercase;
  margin-bottom:32px;
}
.hero-eyebrow-line{width:32px;height:1px;background:var(--ink-3)}
.hero h1{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(54px,11vw,86px);
  line-height:0.95;letter-spacing:-0.025em;
  color:var(--ink);margin-bottom:28px;
}
.hero h1 em{
  font-style:italic;color:var(--accent);
  background:linear-gradient(120deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-desc{
  font-size:17px;color:var(--ink-3);max-width:520px;
  margin-bottom:36px;line-height:1.6;
}
.hero-stats{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px;
}
.hero-stat{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.7);backdrop-filter:blur(10px);
  border:1px solid var(--line);
  border-radius:100px;padding:9px 16px;
  font-size:13px;font-weight:600;color:var(--ink-2);
}
.hero-stat-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.hero-stat:nth-child(2) .hero-stat-dot{background:var(--gold)}
.hero-stat:nth-child(3) .hero-stat-dot{background:var(--green)}

/* HERO ARCHETYPE PREVIEW */
.archetypes-preview{
  display:flex;gap:-8px;margin-bottom:36px;align-items:center;
}
.archetypes-preview-row{display:flex}
.ap-chip{
  width:38px;height:38px;border-radius:50%;
  border:2.5px solid var(--paper);
  background:var(--ink);color:var(--cream);
  display:grid;place-items:center;font-family:var(--serif);font-size:18px;font-style:italic;
  margin-left:-10px;line-height:1;
}
.ap-chip:first-child{margin-left:0}
.ap-chip:nth-child(1){background:#6941c6}
.ap-chip:nth-child(2){background:#1a56db}
.ap-chip:nth-child(3){background:#b45309}
.ap-chip:nth-child(4){background:#be123c}
.ap-chip:nth-child(5){background:#0d7a4e}
.ap-txt{font-size:12px;color:var(--ink-3);margin-left:14px;line-height:1.4}
.ap-txt strong{color:var(--ink);display:block;font-weight:600;font-size:13px}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--sans);font-size:15px;font-weight:600;
  padding:18px 26px;border-radius:var(--r);
  cursor:pointer;border:none;transition:all .3s var(--ease);
  position:relative;overflow:hidden;
  letter-spacing:-0.005em;
}
.btn-primary{
  background:var(--ink);color:var(--cream);
  box-shadow:0 1px 0 rgba(255,255,255,.08) inset, 0 12px 30px -8px rgba(10,14,39,.5);
  width:100%;
}
.btn-primary::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);
  opacity:0;transition:opacity .3s var(--ease);
}
.btn-primary > *{position:relative;z-index:1}
.btn-primary:hover:not(:disabled)::before{opacity:1}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 40px -10px var(--accent-glow)}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary .arrow{transition:transform .3s var(--ease)}
.btn-primary:hover:not(:disabled) .arrow{transform:translateX(4px)}

.btn-ghost{
  background:rgba(255,255,255,.7);backdrop-filter:blur(10px);
  color:var(--ink-2);border:1px solid var(--line-2);
  padding:16px 22px;
}
.btn-ghost:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* CARD */
.card{
  background:rgba(255,255,255,.78);backdrop-filter:blur(20px);
  border:1px solid var(--line);
  border-radius:var(--r-lg);padding:32px 24px;
  box-shadow:0 1px 0 rgba(255,255,255,.8) inset, 0 20px 50px -25px rgba(10,14,39,.15);
}
@media(min-width:520px){.card{padding:40px 36px}}

.fadein{animation:fadeUp .7s var(--ease-out) both}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* FORM */
.eyebrow{
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:var(--ink-3);letter-spacing:0.1em;text-transform:uppercase;
}
.step-title{
  font-family:var(--serif);font-weight:400;
  font-size:38px;line-height:1.05;letter-spacing:-0.02em;
  color:var(--ink);margin:12px 0 28px;
}
.field{margin-bottom:18px}
.field-row{display:grid;grid-template-columns:1fr;gap:18px;margin-bottom:18px}
@media(min-width:520px){.field-row{grid-template-columns:1fr 1fr}}
.field label{
  display:block;font-size:12px;font-weight:600;color:var(--ink-2);
  margin-bottom:8px;letter-spacing:-0.005em;
}
.field input,.field select{
  width:100%;padding:15px 16px;font-size:15px;font-family:var(--sans);font-weight:500;
  background:var(--cream);color:var(--ink);
  border:1.5px solid var(--line);border-radius:var(--r-sm);
  transition:all .2s var(--ease);outline:none;
  -webkit-appearance:none;appearance:none;
}
.field input::placeholder{color:var(--ink-4);font-weight:400}
.field input:focus,.field select:focus{
  border-color:var(--ink);background:#fff;
  box-shadow:0 0 0 4px rgba(10,14,39,.06);
}
.field select{
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1L6 6L11 1' stroke='%230a0e27' stroke-width='1.5' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 18px center;padding-right:42px;
}

/* QUIZ */
.qhdr{margin-bottom:32px}
.qmeta{
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:var(--ink-3);letter-spacing:0.06em;text-transform:uppercase;
  margin-bottom:12px;
}
.qpct{color:var(--ink);font-weight:600}
.ptrack{
  height:3px;background:var(--line);border-radius:100px;overflow:hidden;
}
.pfill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));
  border-radius:100px;transition:width .5s var(--ease-out);
  box-shadow:0 0 12px var(--accent-glow);
}
.dim-label{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  padding:6px 12px;border-radius:100px;margin-bottom:18px;
}
.dim-label::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.dim-assertiveness{background:rgba(190,18,60,.08);color:#be123c}
.dim-expressiveness{background:rgba(180,83,9,.08);color:#b45309}
.dim-empathy{background:rgba(13,122,78,.08);color:#0d7a4e}
.dim-reflection{background:rgba(105,65,198,.08);color:#6941c6}

.quiz-q{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(26px,5.5vw,34px);line-height:1.15;letter-spacing:-0.015em;
  color:var(--ink);margin-bottom:32px;
}

.likert{
  display:flex;flex-direction:column;gap:10px;margin-bottom:28px;
}
.lopt{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:16px 18px;
  background:var(--cream);
  border:1.5px solid var(--line);
  border-radius:var(--r-sm);
  font-family:var(--sans);font-size:15px;font-weight:500;color:var(--ink-2);
  cursor:pointer;transition:all .2s var(--ease);
  text-align:left;
}
.lopt:hover{border-color:var(--ink-3);background:#fff;transform:translateX(2px)}
.lopt.sel{
  background:var(--ink);color:var(--cream);border-color:var(--ink);
  box-shadow:0 8px 20px -8px rgba(10,14,39,.4);
}
.lopt-num{
  flex-shrink:0;width:32px;height:32px;border-radius:50%;
  background:#fff;border:1.5px solid var(--line);
  display:grid;place-items:center;
  font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink-2);
  transition:all .2s var(--ease);
}
.lopt.sel .lopt-num{background:var(--cream);color:var(--ink);border-color:var(--cream)}
.lopt-txt{line-height:1.3}

.btn-row{display:flex;gap:10px}
.btn-row .btn-primary{flex:1}

/* LOADING */
.loading{
  text-align:center;padding:80px 20px;animation:fadeUp .6s var(--ease-out) both;
}
.spinner-wrap{
  display:inline-block;position:relative;width:80px;height:80px;margin-bottom:32px;
}
.spinner-wrap::before{
  content:"";position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,transparent,var(--accent),var(--accent-2),transparent);
  animation:spin 1.4s linear infinite;
}
.spinner-wrap::after{
  content:"";position:absolute;inset:6px;border-radius:50%;background:var(--paper);
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-sub{
  font-size:14px;color:var(--ink-3);margin-bottom:18px;
  font-family:var(--mono);letter-spacing:0.04em;
}
.reveal-cycling{
  font-family:var(--serif);font-size:36px;font-weight:400;letter-spacing:-0.02em;
  color:var(--ink);transition:opacity .15s ease;min-height:50px;
}
.reveal-final{
  background:linear-gradient(120deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:pop .5s var(--ease-out);
}
@keyframes pop{0%{transform:scale(.85)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

/* RESULT */
.result-hero{
  position:relative;padding:48px 28px 40px;border-radius:var(--r-lg);
  background:var(--ink);color:var(--cream);
  overflow:hidden;margin-bottom:28px;
  animation:fadeUp .9s var(--ease-out) both;
}
.result-hero::before{
  content:"";position:absolute;top:-50%;right:-30%;width:600px;height:600px;
  background:radial-gradient(circle,var(--type-color,#3d5afe) 0%,transparent 60%);
  opacity:.35;filter:blur(60px);
}
.result-hero::after{
  content:"";position:absolute;inset:0;opacity:.4;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
  mix-blend-mode:overlay;
}
.result-hero > *{position:relative;z-index:1}
.result-label{
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:rgba(255,255,255,.6);letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:14px;
}
.result-name{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(48px,11vw,72px);line-height:0.95;letter-spacing:-0.025em;
  margin-bottom:14px;color:var(--cream);
}
.result-tagline{
  font-family:var(--serif);font-style:italic;font-size:19px;
  color:rgba(255,255,255,.75);margin-bottom:24px;
}
.result-desc{font-size:15px;color:rgba(255,255,255,.85);line-height:1.7}
.result-desc p{margin-bottom:14px}
.result-desc p:last-child{margin-bottom:0}

.section{margin-bottom:28px;animation:fadeUp .7s var(--ease-out) both}
.section-eyebrow{
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:var(--ink-3);letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:8px;
}
.section-title{
  font-family:var(--serif);font-weight:400;font-size:30px;line-height:1.1;
  letter-spacing:-0.02em;color:var(--ink);margin-bottom:6px;
}
.section-sub{font-size:13px;color:var(--ink-3);margin-bottom:20px}

/* SCORES */
.score-item{
  padding:18px 20px;background:rgba(255,255,255,.65);
  border:1px solid var(--line);border-radius:var(--r-sm);
  margin-bottom:10px;cursor:pointer;transition:all .25s var(--ease);
}
.score-item:hover{background:#fff;border-color:var(--line-2)}
.score-item.active{background:#fff;border-color:var(--ink-3)}
.score-row{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
}
.score-lbl{font-size:14px;font-weight:600;color:var(--ink)}
.score-val{
  font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ink);
}
.score-chevron{font-size:11px;color:var(--ink-3);transition:transform .25s var(--ease)}
.strack{height:6px;background:var(--paper-2);border-radius:100px;overflow:hidden}
.sbar{
  height:100%;border-radius:100px;
  transition:width 1.2s var(--ease-out);
}
.dim-expand{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.dim-expand-inner{padding-top:16px}
.dim-level-badge{
  display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  background:var(--ink);color:var(--cream);
  padding:4px 10px;border-radius:100px;margin-bottom:10px;
}
.dim-expand-inner p{font-size:14px;color:var(--ink-2);line-height:1.65}

/* TAGS */
.tags-blk{margin-bottom:20px}
.tags-lbl{
  font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px;
}
.tags-row{display:flex;flex-wrap:wrap;gap:8px}
.tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;padding:7px 13px;border-radius:100px;
}
.tag-g{background:var(--green-bg);color:var(--green)}
.tag-r{background:var(--red-bg);color:var(--red)}

/* INSIGHT CARDS */
.insight-pair{display:grid;gap:14px;margin-bottom:28px}
.icard{
  padding:22px;border-radius:var(--r-sm);
  background:rgba(255,255,255,.7);border:1px solid var(--line);
}
.icard-hd{
  display:flex;align-items:center;gap:10px;
  font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;
}
.icard-ico{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  display:grid;place-items:center;font-weight:700;font-size:14px;
}
.icard-ico.warn{background:#fde2e1;color:#c0392b}
.icard-ico.tip{background:#dde7ff;color:#3d5afe}
.icard p{font-size:14px;color:var(--ink-2);line-height:1.65}

/* RECOM */
.recom{
  background:var(--ink);color:var(--cream);
  border-radius:var(--r-lg);padding:32px 26px;margin-bottom:24px;position:relative;overflow:hidden;
}
.recom::before{
  content:"";position:absolute;top:-100px;right:-100px;width:300px;height:300px;
  background:radial-gradient(circle,var(--accent) 0%,transparent 60%);
  opacity:.25;filter:blur(40px);
}
.recom > *{position:relative;z-index:1}
.recom-ey{
  font-family:var(--mono);font-size:10px;font-weight:500;
  color:rgba(255,255,255,.6);letter-spacing:0.12em;text-transform:uppercase;
  margin-bottom:12px;
}
.recom h3{
  font-family:var(--serif);font-weight:400;font-size:28px;line-height:1.15;
  letter-spacing:-0.02em;margin-bottom:14px;color:var(--cream);
}
.recom > p{font-size:14px;color:rgba(255,255,255,.78);line-height:1.7;margin-bottom:24px}
.recom > p strong{color:var(--cream);font-weight:600}
.recom-mods{display:flex;flex-direction:column;gap:2px}
.rmod{
  display:flex;gap:14px;padding:16px 0;
  border-top:1px solid rgba(255,255,255,.12);
}
.rmod:last-child{border-bottom:1px solid rgba(255,255,255,.12)}
.rmod-n{
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:rgba(255,255,255,.4);letter-spacing:0.05em;flex-shrink:0;padding-top:2px;
}
.rmod-t{flex:1}
.rmod-t strong{display:block;font-size:14px;font-weight:600;color:var(--cream);margin-bottom:4px}
.rmod-t{font-size:13px;color:rgba(255,255,255,.7);line-height:1.55}

/* PROMO */
.promo{
  background:linear-gradient(135deg,#fff8e7,#fdf0d1);
  border:1px solid rgba(201,161,74,.3);
  border-radius:var(--r-lg);padding:26px;text-align:center;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.promo-lbl{
  font-family:var(--mono);font-size:10px;font-weight:500;
  color:#8b6a1e;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;
}
.promo-code{
  display:inline-block;font-family:var(--mono);font-size:18px;font-weight:600;
  background:#fff;color:var(--ink);padding:12px 22px;border-radius:var(--r-sm);
  border:1.5px dashed var(--gold);letter-spacing:0.04em;margin-bottom:14px;
}
.promo-price{font-size:14px;color:var(--ink-2)}
.promo-price s{color:var(--ink-4)}
.promo-price strong{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--ink);font-style:italic}

.btn-cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:20px 26px;border-radius:var(--r);
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;font-family:var(--sans);font-size:16px;font-weight:600;
  text-decoration:none;letter-spacing:-0.005em;
  box-shadow:0 12px 30px -8px var(--accent-glow);
  transition:all .3s var(--ease);
}
.btn-cta:hover{transform:translateY(-2px);box-shadow:0 18px 40px -10px var(--accent-glow)}
.note{
  text-align:center;font-size:12px;color:var(--ink-3);margin:12px 0 32px;
  font-family:var(--mono);letter-spacing:0.02em;
}

/* SHARE */
.share-blk{padding:24px 22px;background:rgba(255,255,255,.65);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:28px}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.share-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px;border-radius:var(--r-sm);border:none;cursor:pointer;
  font-family:var(--sans);font-size:14px;font-weight:600;
  transition:all .2s var(--ease);
}
.share-wa{background:#25d366;color:#fff}
.share-wa:hover{background:#1eb957;transform:translateY(-1px)}
.share-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.share-ig:hover{transform:translateY(-1px);filter:brightness(1.05)}

/* OTHERS */
.others-grid{display:grid;gap:14px}
.ocard{
  display:flex;gap:14px;align-items:flex-start;
  padding:18px;background:rgba(255,255,255,.7);
  border:1px solid var(--line);border-radius:var(--r-sm);
  transition:all .25s var(--ease);
}
.ocard:hover{background:#fff;transform:translateY(-2px);box-shadow:0 12px 24px -16px rgba(10,14,39,.2)}
.ocard-img{flex-shrink:0;width:60px;height:60px;border-radius:14px;overflow:hidden}
.ocard-img svg{width:100%;height:100%;display:block}
.ocard-body{flex:1;min-width:0}
.ocard-name{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-0.015em;line-height:1.1;margin-bottom:4px}
.ocard-tag{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-3);margin-bottom:8px}
.ocard-desc{font-size:13px;color:var(--ink-2);line-height:1.55}

/* DIVIDER */
.divider{
  height:1px;background:var(--line);margin:32px 0;
}

/* FOOTER */
.ftr{
  text-align:center;font-family:var(--mono);font-size:11px;
  color:var(--ink-4);letter-spacing:0.06em;
  padding-top:40px;border-top:1px solid var(--line);margin-top:40px;
}
.ftr a{color:var(--ink-3);text-decoration:none;border-bottom:1px solid var(--line)}
.ftr a:hover{color:var(--ink)}

@media(max-width:380px){
  .hero{padding-top:48px}
  .step-title,.reveal-cycling{font-size:30px}
}

function calcDimensions(answers) {
  const raw = { assertiveness: 0, expressiveness: 0, empathy: 0, reflection: 0 };
  answers.forEach((val, i) => {
    const q = QUESTIONS[i];
    const scored = q.reverse ? (6 - val) : val;
    raw[q.dimension] += scored;
  });
  const pct = {};
  Object.keys(raw).forEach(d => { pct[d] = Math.round(((raw[d] - 8) / 32) * 100); });
  return pct;
}

function calcArchetype(dims) {
  const { assertiveness: A, expressiveness: E, empathy: EMP, reflection: R } = dims;
  const scores = {
    overthinker: ((100 - A) * 0.55) + (R * 0.45),
    ghost:       ((100 - A) * 0.50) + ((100 - E) * 0.50),
    talker:      (E * 0.55) + ((100 - R) * 0.45),
    dominator:   (A * 0.55) + ((100 - EMP) * 0.45),
    connector: (()=>{
      const geoMean = Math.pow(Math.max(0.01,A/100)*Math.max(0.01,E/100)*Math.max(0.01,EMP/100)*Math.max(0.01,R/100),0.25)*100;
      return geoMean >= 62 ? geoMean : geoMean * 0.72;
    })(),
  };
  return Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
}

  let i=0;

    setTimeout(()=>{ el.textContent=pool[i%pool.length]; el.style.opacity="1"; i++; },120);

    clearInterval(iv);

    setTimeout(()=>{
      el.textContent=final;
      el.classList.add("reveal-final");
      el.style.opacity="1";

  }, 2200);
}

    <div class="section" style="animation-delay:.4s">
      <div class="section-eyebrow">Galeri Archetype</div>
      <div class="section-title">Tipe komunikator lainnya.</div>

      <div class="others-grid">
        ${Object.entries(TYPES).filter(([k])=>k!==S.resultType).map(([k,tp])=>`
        <div class="ocard">
          <div class="ocard-img">${TYPE_SVG[k]}</div>
          <div class="ocard-body">
            <div class="ocard-name" style="color:${tp.color}">${tp.name}</div>
            <div class="ocard-tag">"${tp.tagline}"</div>

  setTimeout(()=>{
    document.querySelectorAll(".sbar").forEach(el=>{
      el.style.width = el.dataset.w+"%";
    });
  }, 200);
}

function getDimLevel(key, val) {
  const d = DIM_DETAIL[key];
  if(val <= 40) return d.low;
  if(val <= 69) return d.mid;
  return d.high;
}

function toggleDim(key) {
  const el = document.getElementById("dexp-"+key);
  const chev = document.getElementById("chev-"+key);
  const card = document.getElementById("sdim-"+key);
  if(el.classList.contains("open")) {
    el.classList.remove("open");
    el.style.maxHeight="0";
    chev.style.transform="rotate(0deg)";
    card.classList.remove("active");
  } else {
    const val = S.dims[key];
    const lvl = getDimLevel(key, val);
    el.innerHTML=`<div class="dim-expand-inner"><span class="dim-level-badge">${lvl.label}</span><p>${lvl.insight}</p></div>`;
    el.classList.add("open");
    el.style.maxHeight="400px";
    chev.style.transform="rotate(90deg)";
    card.classList.add("active");
  }
}

function shareWA() {
  const t = TYPES[S.resultType];
  const name = S.form.name ? S.form.name.split(" ")[0] : "Gw";
  const txt = encodeURIComponent(
    `${name} baru aja ikut TalkDNA™ Assessment dari Stanley Academy dan hasilnya: *${t.name}*\n\n"${t.tagline}"\n\nCoba tes lo juga — gratis, ~5 menit:\nhttps://stanleyacademic.com`
  );
  window.open("https://wa.me/?text="+txt, "_blank");
}

function shareIG() {
  const t = TYPES[S.resultType];
  const name = S.form.name ? S.form.name.split(" ")[0] : "Gw";
  const txt = `Hasil TalkDNA™ ${name}: ${t.name} — "${t.tagline}"\n\nCoba di stanleyacademic.com`;
  if(navigator.share) {
    navigator.share({ title:"TalkDNA™ Result", text: txt, url:"https://stanleyacademic.com" }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(txt).then(()=>{
      alert("Caption udah di-copy! Paste ke Instagram Story lo ya 🙌");
    }).catch(()=>{
      alert("Buka Instagram Story dan tulis:\n\n"+txt);
    });
  }
}

render();
</script>
